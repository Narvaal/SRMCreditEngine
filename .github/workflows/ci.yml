name: CI

on:
  push:
    branches: [dev, main, prod]
  pull_request:
    branches: [dev, main, prod]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Lint (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and test
        run: ./gradlew build

      - name: Upload coverage report (JaCoCo)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-report
          path: backend/build/reports/jacoco/test/html

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  docker-compose-smoke-test:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'

      - name: Wait for frontend
        run: timeout 30 bash -c 'until curl -sf http://localhost:8081 >/dev/null; do sleep 2; done'

      - name: Wait for Prometheus target up
        run: timeout 90 bash -c 'until curl -sf http://localhost:9090/api/v1/targets | grep -q "\"health\":\"up\""; do sleep 3; done'

      - name: Check Grafana health and provisioned dashboard
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/health >/dev/null; do sleep 2; done'
          curl -sf -u admin:admin http://localhost:3000/api/dashboards/uid/srm-credit-engine | grep -q '"title":"SRM Credit Engine"'

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
