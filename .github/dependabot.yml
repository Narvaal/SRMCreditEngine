# Scan automatizado de dependências vulneráveis/desatualizadas (critério S10
# de docs/criterios-aceite.md) — um PR por atualização, semanal, por ecossistema.
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/backend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Tooling de Git hooks da raiz (Husky/commitlint/lint-staged)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/backend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/frontend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
