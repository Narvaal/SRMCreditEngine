server {
    listen 8080;  # >1024: a imagem unprivileged roda como não-root
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy pro backend pelo nome do serviço no docker-compose — replica o
    # `server.proxy` do Vite (usado em dev) sem exigir nenhuma mudança nas chamadas
    # fetch('/api/...') já escritas em frontend/src/api/.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Fallback do SPA: rotas do react-router (ex: /transacoes) não existem como arquivo,
    # sempre servir index.html e deixar o roteamento client-side assumir.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
