services:
  postgres:
    image: postgres:17
    container_name: srm-postgres
    # Default do Docker é 64MB de /dev/shm — insuficiente pros hash joins de
    # query paralela do Postgres sob concorrência (achado do teste de carga:
    # "could not resize shared memory segment" virando 500 no extrato).
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${DB_USER:-srm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-srm}
      POSTGRES_DB: ${DB_NAME:-srm_credit_engine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-srm} -d ${DB_NAME:-srm_credit_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: srm-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-srm_credit_engine}
      DB_USER: ${DB_USER:-srm}
      DB_PASSWORD: ${DB_PASSWORD:-srm}
      # Sincronização periódica com o provider mockado — mantém o circuit breaker ciclando
      # e visível nas métricas do Prometheus/Grafana sem intervenção manual.
      FX_PROVIDER_SYNC_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: srm-frontend
    ports:
      - "8081:8080"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: srm-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:12.2.10
    container_name: srm-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
